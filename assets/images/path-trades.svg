<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7aa6ff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="p" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M0 80 L80 0" stroke="#7aa6ff" stroke-opacity=".22" stroke-width="2"/>
      <path d="M-40 80 L40 0" stroke="#7aa6ff" stroke-opacity=".14" stroke-width="2"/>
      <path d="M40 80 L120 0" stroke="#7aa6ff" stroke-opacity=".14" stroke-width="2"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="#000"/>
  <rect width="1200" height="700" fill="url(#p)"/>
  <circle cx="240" cy="160" r="170" fill="url(#g)" filter="url(#blur)"/>
  <circle cx="960" cy="520" r="260" fill="url(#g)" filter="url(#blur)"/>
  <path d="M0 520 C 240 480, 420 640, 680 610 C 900 585, 980 470, 1200 500" fill="none" stroke="#b7ccff" stroke-opacity=".18" stroke-width="3"/>
</svg>
