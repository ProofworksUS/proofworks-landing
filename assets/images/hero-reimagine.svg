<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="85%">
      <stop offset="0" stop-color="#0f131b"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".12"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity=".05">
    <path d="M0 140 H1200"/>
    <path d="M0 260 H1200"/>
    <path d="M0 380 H1200"/>
    <path d="M0 500 H1200"/>
    <path d="M0 620 H1200"/>
    <path d="M0 740 H1200"/>
    <path d="M140 0 V800"/>
    <path d="M320 0 V800"/>
    <path d="M500 0 V800"/>
    <path d="M680 0 V800"/>
    <path d="M860 0 V800"/>
    <path d="M1040 0 V800"/>
  </g>

  <!-- mark -->
  <g transform="translate(600 260)" filter="url(#glow)">
    <circle r="120" fill="none" stroke="url(#ring)" stroke-width="6"/>
    <circle r="86" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.10)" stroke-width="1"/>
    <text x="0" y="18" text-anchor="middle" font-size="90" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#ffffff" font-weight="900">P</text>
  </g>

  <!-- copy -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#ffffff">
    <text x="600" y="470" text-anchor="middle" font-size="56" font-weight="950">Reimagine Credentials.</text>
    <text x="600" y="525" text-anchor="middle" font-size="22" fill="rgba(255,255,255,.72)">Proof, not pedigree.</text>
    <text x="600" y="580" text-anchor="middle" font-size="18" fill="rgba(255,255,255,.58)">Independent review • permanent record • auditable stewardship</text>
  </g>
</svg>
